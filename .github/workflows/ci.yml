name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Activate pnpm from packageManager field
        run: corepack enable

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Check (format + lint + types)
        run: pnpm exec vp check

      - name: Tests
        run: pnpm exec vp test --run

      - name: Build
        run: pnpm exec vp build
