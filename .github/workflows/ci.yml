name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: corepack enable

      - run: npm ci

      - name: Check (format + lint + types)
        run: npx vp check

      - name: Tests
        run: npx vp test --run

      - name: Build
        run: npx vp build
